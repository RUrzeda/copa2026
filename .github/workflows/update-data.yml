name: Auto-update data

on:
  schedule:
    - cron: '0 * * * *'   # backup horário — o auto-trigger mantém a cadeia viva
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Loop de atualização
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          HOUR=$(( 10#$(date -u +%H) ))
          MONTH=$(( 10#$(date -u +%m) ))
          DAY=$(( 10#$(date -u +%d) ))

          # Período da Copa: 11 jun – 19 jul
          COPA=false
          if { [ $MONTH -eq 6 ] && [ $DAY -ge 11 ]; } || \
             { [ $MONTH -eq 7 ] && [ $DAY -le 19 ]; }; then
            COPA=true
          fi

          # Janela de jogos: 12h–04h UTC (cobre todas as janelas da Copa em BRT/ET/PT)
          MATCH_HOURS=false
          if [ "$COPA" = "true" ] && { [ $HOUR -ge 12 ] || [ $HOUR -le 4 ]; }; then
            MATCH_HOURS=true
          fi

          if [ "$MATCH_HOURS" = "true" ]; then
            # 5h50min — termina antes do timeout de 6h, deixando margem para auto-trigger
            LOOP_SECONDS=21000
            INTERVAL=90
            echo "⚽ Modo ao vivo — loop de 5h50min, checando a cada 90s"
          else
            LOOP_SECONDS=0
            INTERVAL=0
            echo "💤 Fora do horário de jogo — execução única"
          fi

          END=$(( $(date +%s) + LOOP_SECONDS ))

          while true; do
            # Captura hash dos dados reais ANTES do fetch (ignora meta.json que muda sempre)
            BEFORE=$(md5sum public/data/matches.json public/data/scorers.json \
                           public/data/standings.json 2>/dev/null | md5sum)

            node scripts/fetch-data.js

            AFTER=$(md5sum public/data/matches.json public/data/scorers.json \
                          public/data/standings.json 2>/dev/null | md5sum)

            if [ "$BEFORE" != "$AFTER" ]; then
              git add public/data/
              git commit -m "data: live update"
              git push || (git pull --rebase && git push)
              gh workflow run deploy.yml --ref main
              echo "✅ Deploy disparado — $(date -u +'%H:%M:%S UTC')"
            else
              echo "⏸  Sem alteração — $(date -u +'%H:%M:%S UTC')"
            fi

            [ $(date +%s) -ge $END ] && break
            sleep $INTERVAL
          done

      - name: Auto-trigger se ainda em horário de jogo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Recalcula horário ao FIM do loop (pode ter passado horas)
          HOUR=$(( 10#$(date -u +%H) ))
          MONTH=$(( 10#$(date -u +%m) ))
          DAY=$(( 10#$(date -u +%d) ))

          COPA=false
          if { [ $MONTH -eq 6 ] && [ $DAY -ge 11 ]; } || \
             { [ $MONTH -eq 7 ] && [ $DAY -le 19 ]; }; then
            COPA=true
          fi

          if [ "$COPA" = "true" ] && { [ $HOUR -ge 12 ] || [ $HOUR -le 4 ]; }; then
            echo "⚽ Ainda em horário de jogo — disparando próximo run para manter cadeia"
            gh workflow run update-data.yml --ref main || true
          else
            echo "💤 Fora do horário de jogo — cadeia encerrada, cron retoma quando necessário"
          fi
