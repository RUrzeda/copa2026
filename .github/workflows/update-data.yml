name: Auto-update data

on:
  schedule:
    - cron: '0 * * * *'   # dispara 1x/hora — o job decide por quanto tempo loopa
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Loop de atualização
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          HOUR=$(( 10#$(date -u +%H) ))
          MONTH=$(( 10#$(date -u +%m) ))
          DAY=$(( 10#$(date -u +%d) ))

          # Período da Copa: 11 jun – 19 jul
          COPA=false
          if { [ $MONTH -eq 6 ] && [ $DAY -ge 11 ]; } || \
             { [ $MONTH -eq 7 ] && [ $DAY -le 19 ]; }; then
            COPA=true
          fi

          # Janela de jogos: 12h–04h UTC (cobre todas as janelas da Copa)
          MATCH_HOURS=false
          if [ "$COPA" = "true" ] && { [ $HOUR -ge 12 ] || [ $HOUR -le 4 ]; }; then
            MATCH_HOURS=true
          fi

          if [ "$MATCH_HOURS" = "true" ]; then
            LOOP_SECONDS=3300   # 55 min — termina antes do próximo trigger horário
            INTERVAL=90         # checa a cada 90 segundos
            echo "⚽ Modo ao vivo — loop de 55 min, intervalo 90s"
          else
            LOOP_SECONDS=0
            INTERVAL=0
            echo "💤 Modo normal — execução única"
          fi

          END=$(( $(date +%s) + LOOP_SECONDS ))

          while true; do
            node scripts/fetch-data.js

            git add public/data/
            if ! git diff --staged --quiet; then
              git commit -m "data: live update"
              git push
              gh workflow run deploy.yml --ref main
              echo "✅ Deploy disparado às $(date -u +%H:%M:%S) UTC"
            else
              echo "⏸  Sem alteração — $(date -u +%H:%M:%S) UTC"
            fi

            [ $(date +%s) -ge $END ] && break
            sleep $INTERVAL
          done
