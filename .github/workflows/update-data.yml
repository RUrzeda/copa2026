name: Auto-update data

on:
  schedule:
    - cron: '*/5 14-23 11-30 6 *'
    - cron: '*/5 0-3 11-30 6 *'
    - cron: '*/5 14-23 1-19 7 *'
    - cron: '*/5 0-3 1-19 7 *'
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "Dados sem alteração, nenhum deploy necessário."
          else
            git commit -m "data: auto-update"
            git push
          fi
