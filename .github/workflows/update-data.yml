name: Auto-update data

on:
  schedule:
    - cron: '*/5 14-23 11-30 6 *'
    - cron: '*/5 0-3 11-30 6 *'
    - cron: '*/5 14-23 1-19 7 *'
    - cron: '*/5 0-3 1-19 7 *'
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GA_ID:      ${{ secrets.VITE_GA_ID }}
          VITE_ADSENSE_ID: ${{ secrets.VITE_ADSENSE_ID }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'data: auto-update'
          keep_files: false
